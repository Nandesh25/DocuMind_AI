name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Build Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  frontend-test:
    name: Test Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (headless Chrome)
        run: npm run test:ci

  backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: pip install --upgrade pip ruff

      - name: Lint (advisory)
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Compile check
        run: python -m compileall app migrations

      - name: Install test dependencies
        run: |
          pip install pytest pydantic pydantic-settings "python-jose[cryptography]" bcrypt email-validator

      - name: Unit tests
        run: python -m pytest tests/unit

  backend-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi "sqlalchemy[asyncio]" greenlet python-multipart \
            "python-jose[cryptography]" bcrypt email-validator pydantic pydantic-settings \
            pytest pytest-asyncio httpx aiosqlite

      - name: Integration tests (SQLite)
        run: python -m pytest tests/integration
