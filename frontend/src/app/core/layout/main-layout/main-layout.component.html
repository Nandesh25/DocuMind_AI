<mat-toolbar color="primary" class="toolbar">
  <button mat-icon-button (click)="drawer.toggle()" aria-label="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="brand" routerLink="/workspaces">DocuMind AI</span>
  <span class="spacer"></span>

  <button mat-icon-button (click)="theme.toggle()" aria-label="Toggle theme">
    <mat-icon>{{ theme.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="profileMenu" aria-label="Account">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #profileMenu="matMenu">
    <div class="menu-header" *ngIf="auth.user() as user">
      <strong>{{ user.full_name }}</strong>
      <small>{{ user.email }}</small>
    </div>
    <button mat-menu-item routerLink="/settings">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>

@if (loading.isLoading()) {
  <mat-progress-bar mode="indeterminate" class="top-loader" />
}

<mat-sidenav-container class="container">
  <mat-sidenav #drawer mode="side" opened class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/workspaces" routerLinkActive="active-link">
        <mat-icon matListItemIcon>folder_shared</mat-icon>
        <span matListItemTitle>Workspaces</span>
      </a>

      @if (workspaceId(); as wsId) {
        <mat-divider />
        <a
          mat-list-item
          [routerLink]="['/workspaces', wsId, 'dashboard']"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a
          mat-list-item
          [routerLink]="['/workspaces', wsId, 'documents']"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>description</mat-icon>
          <span matListItemTitle>Documents</span>
        </a>
        <a
          mat-list-item
          [routerLink]="['/workspaces', wsId, 'chat']"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>chat</mat-icon>
          <span matListItemTitle>Chat</span>
        </a>
        <a
          mat-list-item
          [routerLink]="['/workspaces', wsId, 'search']"
          routerLinkActive="active-link"
        >
          <mat-icon matListItemIcon>search</mat-icon>
          <span matListItemTitle>Search</span>
        </a>
      }

      <mat-divider />
      <a mat-list-item routerLink="/settings" routerLinkActive="active-link">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
